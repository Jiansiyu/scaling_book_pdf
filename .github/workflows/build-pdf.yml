name: Build Scaling Book PDF

# Once a day: check whether the upstream book repo
# (https://github.com/jax-ml/scaling-book) has a new commit on `main`.
# If nothing changed since the last build, skip. Otherwise clone upstream,
# build a PDF, upload it as an artifact, and (optionally) commit it to this repo.

on:
  schedule:
    - cron: "0 6 * * *"          # 06:00 UTC daily (https://crontab.guru)
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if upstream has no new commit"
        type: boolean
        default: true
      commit_pdf:
        description: "Commit the PDF back to this repo (off = artifact only, for testing)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-pdf
  cancel-in-progress: false

env:
  UPSTREAM_URL: https://github.com/jax-ml/scaling-book.git
  UPSTREAM_BRANCH: main
  PANDOC_VERSION: "3.10"          # pinned: older pandoc mishandles the book's math

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Get latest upstream commit SHA
        id: upstream
        run: |
          SHA="$(git ls-remote "$UPSTREAM_URL" "refs/heads/$UPSTREAM_BRANCH" | cut -f1)"
          [ -n "$SHA" ] || { echo "Could not read upstream SHA" >&2; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Latest upstream SHA: $SHA"

      - name: Read last built SHA
        id: last
        run: |
          if [ -f .last_build_sha ]; then echo "sha=$(cat .last_build_sha)" >> "$GITHUB_OUTPUT";
          else echo "sha=none" >> "$GITHUB_OUTPUT"; fi

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Forced rebuild."; echo "build=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.upstream.outputs.sha }}" = "${{ steps.last.outputs.sha }}" ]; then
            echo "No new upstream commit (${{ steps.last.outputs.sha }}). Skipping."
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream commit. Building."; echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone upstream at latest main
        if: steps.decide.outputs.build == 'true'
        run: git clone --depth 1 --branch "$UPSTREAM_BRANCH" "$UPSTREAM_URL" upstream

      - name: Set up Python
        if: steps.decide.outputs.build == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pandoc, XeLaTeX, ImageMagick, poppler
        if: steps.decide.outputs.build == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra lmodern \
            imagemagick poppler-utils
          curl -fsSL -o /tmp/pandoc.deb \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1

      - name: Build PDF
        if: steps.decide.outputs.build == 'true'
        run: bash build/build.sh upstream scaling-book.pdf

      # Always keep build diagnostics, even if the build step failed.
      - name: Upload build logs (debug)
        if: steps.decide.outputs.build == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            upstream/scaling-book-combined.md
            upstream/xelatex-pass2.log
          if-no-files-found: ignore

      - name: Upload PDF artifact
        if: steps.decide.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scaling-book-pdf
          path: scaling-book.pdf
          if-no-files-found: error

      # Disabled while testing. Set commit_pdf=true (or change its default) to
      # start committing scaling-book.pdf + .last_build_sha into this repo.
      - name: Commit and push PDF
        if: steps.decide.outputs.build == 'true' && github.event.inputs.commit_pdf == 'true'
        run: |
          echo "${{ steps.upstream.outputs.sha }}" > .last_build_sha
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scaling-book.pdf .last_build_sha
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Rebuild PDF from upstream ${{ steps.upstream.outputs.sha }}"
            git push
          fi
